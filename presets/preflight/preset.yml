schema_version: "1.0"

preset:
  id: "preflight"
  name: "Preflight — spec-driven review workflow"
  version: "0.7.0.dev0"
  description: "Preflight's document-type templates plus PAI-delegated task/implement overrides. Pair with the preflight extension for rule-based review hooks."
  author: "nichenke"
  repository: "https://github.com/nichenke/preflight"
  license: "MIT"

requires:
  speckit_version: ">=0.1.0"

provides:
  templates:
    - type: "command"
      name: "speckit.tasks"
      file: "commands/speckit.tasks.md"
      description: "Delegate task decomposition to PAI Algorithm (no tasks.md generated)"
      replaces: "speckit.tasks"

    - type: "command"
      name: "speckit.implement"
      file: "commands/speckit.implement.md"
      description: "Delegate implementation execution to PAI Algorithm reading plan.md directly"
      replaces: "speckit.implement"

tags:
  - "preflight"
  - "spec-driven"
  - "pai"
  - "review"
