schema_version: "1.0"

preset:
  id: "preflight"
  name: "Preflight — spec-driven review workflow"
  version: "0.7.0.dev3"
  description: "Preflight's seven document-type templates (ADR, RFC, architecture, constitution, interface-contract, requirements, test-strategy). Pair with the preflight extension for on-demand rule-based review via /speckit.preflight.review."
  author: "nichenke"
  repository: "https://github.com/nichenke/preflight"
  license: "MIT"

requires:
  speckit_version: ">=0.6.2,<0.7.0"

provides:
  templates:
    - type: "template"
      name: "adr"
      file: "templates/adr-template.md"
      description: "Architectural Decision Record (MADR 4.0)"

    - type: "template"
      name: "architecture"
      file: "templates/architecture-template.md"
      description: "Architecture document (arc42-aligned)"

    - type: "template"
      name: "constitution"
      file: "templates/constitution-template.md"
      description: "Project constitution"

    - type: "template"
      name: "interface-contract"
      file: "templates/interface-contract-template.md"
      description: "Interface contract"

    - type: "template"
      name: "requirements"
      file: "templates/requirements-template.md"
      description: "Requirements document (EARS syntax)"

    - type: "template"
      name: "rfc"
      file: "templates/rfc-template.md"
      description: "Request for Comments"

    - type: "template"
      name: "test-strategy"
      file: "templates/test-strategy-template.md"
      description: "Test strategy document"

tags:
  - "preflight"
  - "spec-driven"
  - "review"
