schema_version: "1.0"

extension:
  id: "preflight"
  name: "Preflight — rule-based document review"
  version: "0.7.0.dev2"
  description: "Runs preflight's curated rule set against spec.md or plan.md on demand via /speckit.preflight.review. Rules loaded as prompt context; findings reported by severity with stable rule IDs."
  author: "nichenke"
  repository: "https://github.com/nichenke/preflight"
  license: "MIT"
  homepage: "https://github.com/nichenke/preflight/tree/main/extensions/preflight"

requires:
  speckit_version: ">=0.6.2,<0.7.0"

provides:
  commands:
    - name: "speckit.preflight.review"
      file: "commands/speckit.preflight.review.md"
      description: "Review the active feature's spec.md or plan.md against preflight's rule set"
      aliases: ["preflight.review"]

tags:
  - "preflight"
  - "review"
  - "rules"
  - "quality-gate"
