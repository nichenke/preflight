schema_version: "1.0"

extension:
  id: "preflight"
  name: "Preflight — rule-based document review"
  version: "0.7.0.dev0"
  description: "Runs preflight's curated rule set against spec.md and plan.md via after_specify / after_plan hooks. Rules loaded as prompt context; findings reported by severity with stable rule IDs."
  author: "nichenke"
  repository: "https://github.com/nichenke/preflight"
  license: "MIT"
  homepage: "https://github.com/nichenke/preflight/tree/main/extensions/preflight"

requires:
  speckit_version: ">=0.1.0"

provides:
  commands:
    - name: "speckit.preflight.review"
      file: "commands/speckit.preflight.review.md"
      description: "Review the active feature's spec.md or plan.md against preflight's rule set"
      aliases: ["preflight.review"]

hooks:
  after_specify:
    command: "speckit.preflight.review"
    description: "Run preflight rule-based review on spec.md after /speckit.specify"
  after_plan:
    command: "speckit.preflight.review"
    description: "Run preflight rule-based review on plan.md after /speckit.plan"

tags:
  - "preflight"
  - "review"
  - "rules"
  - "quality-gate"
